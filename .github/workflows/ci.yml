name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    name: Build & typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

  painkiller:
    name: GraphQL Painkiller
    # post-pr-comments needs the pull_request event payload to locate the PR,
    # so this job only runs on PRs (not on pushes to main).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"

      - name: Install GraphQL Painkiller
        run: go install github.com/olddognewflex/graphql-painkiller/cmd/gql-painkiller@latest

      # Posts findings as a PR review and fails the job on HIGH or above.
      # main intentionally ships an N+1 operation rated CRITICAL, so this gate
      # is expected to flag PRs until the operations are fixed.
      - name: Post PR review comments
        run: >-
          gql-painkiller post-pr-comments ./operations
          --config gql-painkiller.config.yaml
          --fail-on high
        env:
          GITHUB_TOKEN: ${{ github.token }}
